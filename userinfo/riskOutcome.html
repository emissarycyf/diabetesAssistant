<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>糖尿病风险评估</title>
    <script src="/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="/css/all.min.css">
    <script src="js/riskOutcome.js"></script>
    <link rel="stylesheet" href="css/riskOutcome.css">
</head>

<body class="min-h-[1024px] bg-gradient-to-br from-blue-50 via-gray-50 to-indigo-50">
    <nav class="top-0 w-full bg-white text-black border-b border-gray-200 shadow-md px-4 py-4 flex items-center z-50">
        <button class="text-black">
            <i class="fas fa-arrow-left text-xl w-6 h-6 flex items-center justify-center"></i>
        </button>
        <h1 class="text-black text-xl font-bold flex-1 text-center">评估结果</h1>
        <div class="w-6"></div>
    </nav>
    <main class="mt-[10px] px-4">
        <div class="flex flex-col items-center mt-6 bg-white rounded-lg p-4 shadow-sm">
            <div class="w-24 h-24 flex items-center justify-center mb-4">
                <img src="/img/diabetes_show.png" alt="result" width="40" height="50">
            </div>
            <span id="resultSpan" class="text-lg text-gray-700 mb-1">中等风险</span>
            <p id="resultText" class="text-center text-gray-600">您目前处于糖尿病中等风险水平</p>
        </div>
        <div class="flex flex-col items-center mt-6 bg-white rounded-lg p-4 shadow-sm">
            <h2 class="text-lg font-medium mb-4">健康建议</h2>
            <div id="messageDiv" class="space-y-4">

            </div>
        </div>
        <div class="pt-6 text-center">
            <button type="submit"
                class="bg-black text-white px-8 py-3 rounded-button hover:bg-blue-600 transition-all duration-200 whitespace-nowrap shadow-lg hover:shadow-blue-200 hover:-translate-y-0.5"
                onclick="window.location.replace('userInfo.html')">
                返回个人信息
            </button>
        </div>
    </main>
</body>

</html>
