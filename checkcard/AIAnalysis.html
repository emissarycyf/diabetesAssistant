<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生活智能分析</title>
    <script src="/js/tailwindcss.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/user.js"></script>
    <script src="/js/loading.js"></script>
    <script src="js/AIAnalysis.js"></script>

    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/loading.css">
    <link rel="stylesheet" href="css/AIAnalysis.css">

</head>

<body class="bg-gray-50 font-sans text-gray-800 min-h-screen relative">
    <!-- 顶部导航栏 -->
    <header class="fixed top-0 left-0 right-0 z-10 shadow-sm bg-white">
        <div class="flex items-center justify-between px-6 py-3">
            <button onclick="window.history.back()">
                <i class="fas fa-chevron-left text-lg"></i>
            </button>
            <h1 class="text-lg font-medium">AI智能打卡分析</h1>
            <button>
            </button>
        </div>
    </header>
    <!-- 主要内容区域 -->
    <main class="pt-16 pb-20 px-4 overflow-y-auto min-h-[calc(100vh-8rem)]">
        <!-- 计划完成状态 -->
        <section class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-4 md:mb-6">
            <h2 class="text-gray-800 mb-4 title">计划完成状态</h2>
            <div class="flex-1 flex flex-col items-center">
                <div class="relative w-24 h-24 mb-4">
                    <svg class="w-full h-full" viewBox="0 0 100 100">
                        <!-- Background circle -->
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#e5e7eb" stroke-width="8" />
                        <!-- Progress circle -->
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#3B82F6" stroke-width="8"
                            stroke-linecap="round" stroke-dasharray="283" stroke-dashoffset="0"
                            class="progress-circle transform -rotate-90 origin-center" />
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="text-xl font-bold text-primary progress-percent">0%</span>
                    </div>
                </div>
                <div id="completionStatus" class="message">

                </div>
            </div>
            <p class="show-process-text"></p>

        </section>
        <!-- 生活评价 -->
        <section class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-4 md:mb-6">
            <h2 class="text-gray-800 mb-4 title">生活评价</h2>
            <div class="flex items-start">

                <div id="evaluate" class="message">
                </div>
            </div>
        </section>
        <!-- 改进建议 -->
        <section class="bg-white rounded-xl shadow-sm p-4 md:p-6">
            <h2 class="text-gray-800 mb-4 title">改进建议</h2>
            <div class="flex items-start">

                <div id="suggestion" class="message">
                    <br/>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
